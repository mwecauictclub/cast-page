<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Club Week 2026 — MWECAU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a14;--surface:#0b1629;--surface2:#0f1e38;
  --blue:#1d6fff;--blue-bright:#4d8fff;--cyan:#00d4ff;
  --white:#f0f4ff;--muted:#6b7fa8;--grid:#070e1e;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--white);font-family:'Syne',sans-serif;overflow:hidden;user-select:none}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(29,111,255,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(29,111,255,0.06) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.022) 2px,rgba(0,0,0,0.022) 4px);pointer-events:none;z-index:100}
.glow{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0}
.g1{width:700px;height:700px;background:#1a3a8f;opacity:.28;top:-200px;left:-150px}
.g2{width:500px;height:500px;background:#003d6e;opacity:.28;bottom:-120px;right:-80px}
#app{position:relative;z-index:1;width:100vw;height:100vh;display:flex;flex-direction:column}

#topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 44px;border-bottom:1px solid rgba(29,111,255,0.15);background:rgba(5,10,20,0.82);backdrop-filter:blur(12px);flex-shrink:0;gap:16px}
.tb-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
#logo-img{width:36px;height:36px;object-fit:contain;border-radius:8px;display:none}
.logo-fb{width:36px;height:36px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.tb-name{font-size:14px;font-weight:700;letter-spacing:.04em}
.tb-sub{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.tb-c{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.pdot{width:7px;height:7px;border-radius:50%;background:#00d4ff;animation:pa 1.8s ease-in-out infinite}
@keyframes pa{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
#clock{font-family:'Space Mono',monospace;font-size:19px;font-weight:700;letter-spacing:.06em;flex-shrink:0}

#stage{flex:1;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;opacity:0;pointer-events:none;transition:opacity .55s ease}
.slide.active{opacity:1;pointer-events:all}

/* HERO */
.s-hero{flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 60px;gap:18px}
.eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#00d4ff;border:1px solid rgba(0,212,255,.3);padding:6px 18px;border-radius:30px;display:inline-block}
.s-hero h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(58px,8.5vw,115px);line-height:.92;letter-spacing:-.02em}
.s-hero h1 em{font-style:italic;background:linear-gradient(135deg,#4d8fff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.07em;max-width:640px;line-height:1.75}
.dbadge{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.dpill{background:var(--surface2);border:1px solid rgba(29,111,255,.28);border-radius:12px;padding:10px 22px;font-family:'Space Mono',monospace;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
.dpill span:first-child{color:var(--muted);font-size:9px;letter-spacing:.15em;text-transform:uppercase}
.dpill span:last-child{font-weight:700}

/* ACTIVITY */
.s-act{flex-direction:row;align-items:stretch}
.act-c{flex:1.1;padding:48px 42px 48px 58px;display:flex;flex-direction:column;justify-content:center;gap:18px}
.act-tag{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#4d8fff;display:flex;align-items:center;gap:10px}
.act-tag::before{content:'';display:inline-block;width:26px;height:2px;background:#4d8fff}
.act-c h2{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(36px,5vw,66px);line-height:1.0;letter-spacing:-.02em}
.act-desc{font-size:15px;line-height:1.75;color:rgba(240,244,255,.68);max-width:460px}
.act-items{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.ai{background:var(--surface2);border:1px solid rgba(29,111,255,.2);border-radius:8px;padding:7px 13px;font-size:12px;font-family:'Space Mono',monospace;color:rgba(240,244,255,.8);display:flex;align-items:center;gap:6px}
.ai::before{content:'✓';color:#00d4ff;font-size:10px}
.act-v{flex:.9;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.act-v::before{content:'';position:absolute;inset:0;background:linear-gradient(270deg,transparent 50%,var(--bg) 100%);z-index:2}
.act-img{width:100%;height:100%;object-fit:cover;opacity:.5}
.act-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:90px;opacity:.32}

/* AWARENESS */
.s-aw{flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:58px 80px;gap:20px}
.aw-icon{font-size:60px;line-height:1}
.aw-tag{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#00d4ff;border:1px solid rgba(0,212,255,.22);padding:4px 14px;border-radius:20px;display:inline-block}
.s-aw h2{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(32px,4.8vw,60px);line-height:1.08;letter-spacing:-.015em;max-width:820px}
.aw-body{font-size:15px;line-height:1.8;color:rgba(240,244,255,.66);max-width:700px}
.aw-hl{background:rgba(29,111,255,.1);border:1px solid rgba(29,111,255,.24);border-radius:14px;padding:14px 28px;font-family:'Space Mono',monospace;font-size:13px;color:#4d8fff;letter-spacing:.03em;margin-top:4px;max-width:680px}

/* STAT */
.s-st{flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:60px}
.st-lbl{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.st-num{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(78px,14vw,165px);line-height:.88}
.st-num em{color:#00d4ff}
.st-sub{font-size:15px;color:rgba(240,244,255,.52);max-width:560px;line-height:1.75}
.st-grid{display:flex;gap:22px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.sc{background:var(--surface2);border:1px solid rgba(29,111,255,.18);border-radius:14px;padding:16px 28px;display:flex;flex-direction:column;align-items:center;gap:4px}
.sc .n{font-family:'Instrument Serif',serif;font-style:italic;font-size:36px;color:#4d8fff}
.sc .l{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

/* QUOTE */
.s-qt{flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px;padding:70px 100px}
.qm{font-family:'Instrument Serif',serif;font-size:110px;line-height:.65;color:var(--blue);opacity:.32;font-style:italic}
.qt{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(24px,4vw,48px);line-height:1.3;letter-spacing:-.01em;max-width:860px}
.qa{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#00d4ff;display:flex;align-items:center;gap:12px}
.qa::before,.qa::after{content:'';display:inline-block;width:34px;height:1px;background:rgba(0,212,255,.33)}
.qd{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}

/* SCHEDULE */
.s-sc{flex-direction:column;align-items:center;justify-content:center;padding:42px 70px;gap:26px}
.sc-h{text-align:center}
.sc-h h2{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(36px,5.5vw,72px);line-height:.95;letter-spacing:-.02em;margin-top:10px}
.sc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;width:100%;max-width:860px}
.si{background:var(--surface2);border:1px solid rgba(29,111,255,.17);border-radius:14px;padding:17px}
.si .dy{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#4d8fff}
.si .an{font-size:15px;font-weight:700;margin-top:4px}
.si .tb{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px}

/* ANNOUNCE */
.s-an{flex-direction:row;align-items:center;padding:52px 66px;gap:52px}
.an-l{flex:1;display:flex;flex-direction:column;gap:16px}
.an-ey{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#00d4ff;display:flex;align-items:center;gap:10px}
.an-ey::before{content:'';width:22px;height:2px;background:#00d4ff;display:inline-block}
.an-l h2{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(34px,4.8vw,64px);line-height:1.0;letter-spacing:-.02em}
.an-l p{font-size:14px;color:rgba(240,244,255,.62);line-height:1.75;max-width:420px}
.an-hi{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.an-hi-i{display:flex;align-items:center;gap:12px;font-size:13px;color:rgba(240,244,255,.78)}
.an-ico{width:33px;height:33px;border-radius:10px;background:rgba(29,111,255,.13);border:1px solid rgba(29,111,255,.27);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.an-r{flex:.85;display:flex;flex-direction:column;gap:12px}
.an-card{background:var(--surface2);border:1px solid rgba(29,111,255,.17);border-radius:14px;padding:15px 20px;font-family:'Space Mono',monospace;font-size:12px;color:rgba(240,244,255,.66);display:flex;align-items:center;gap:12px}
.an-card .num{font-family:'Instrument Serif',serif;font-style:italic;font-size:26px;color:#4d8fff;flex-shrink:0;line-height:1}

/* TYPEWRITER */
.s-tw{flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 100px;gap:22px}
.tw-pre{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.tw-wrap{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(30px,4.6vw,58px);line-height:1.28;max-width:900px;min-height:2.6em;display:flex;align-items:center;justify-content:center;text-align:center}
.cursor{display:inline-block;width:3px;height:.82em;background:#00d4ff;margin-left:5px;vertical-align:middle;animation:bl .75s step-end infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

/* PROGRESS */
#pb-wrap{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(29,111,255,.09);z-index:10}
#pb{height:100%;background:linear-gradient(90deg,var(--blue),#00d4ff);width:0%;box-shadow:0 0 8px var(--blue)}
#dots{position:fixed;bottom:13px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(107,127,168,.35);transition:all .3s;cursor:pointer}
.dot.active{background:#4d8fff;width:20px;border-radius:3px}
#ctr{position:fixed;bottom:15px;right:34px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;z-index:10}

/* ANIMATIONS */
.au,.al,.ar{opacity:0}
.slide.active .au{animation:sU .68s cubic-bezier(.16,1,.3,1) forwards}
.slide.active .au:nth-child(1){animation-delay:.04s}
.slide.active .au:nth-child(2){animation-delay:.13s}
.slide.active .au:nth-child(3){animation-delay:.22s}
.slide.active .au:nth-child(4){animation-delay:.31s}
.slide.active .au:nth-child(5){animation-delay:.40s}
.slide.active .au:nth-child(6){animation-delay:.49s}
@keyframes sU{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
.slide.active .al{animation:sL .68s cubic-bezier(.16,1,.3,1) forwards}
.slide.active .al:nth-child(1){animation-delay:.04s}
.slide.active .al:nth-child(2){animation-delay:.13s}
.slide.active .al:nth-child(3){animation-delay:.22s}
.slide.active .al:nth-child(4){animation-delay:.31s}
.slide.active .al:nth-child(5){animation-delay:.40s}
@keyframes sL{from{opacity:0;transform:translateX(-34px)}to{opacity:1;transform:translateX(0)}}
.slide.active .ar{animation:sR .68s cubic-bezier(.16,1,.3,1) .16s forwards}
@keyframes sR{from{opacity:0;transform:translateX(34px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div class="glow g1"></div><div class="glow g2"></div>
<div id="app">
  <div id="topbar">
    <div class="tb-brand">
      <!-- LOGO: set src to your logo file path below -->
      <img id="logo-img" src="" alt="logo" onerror="this.style.display='none';document.querySelector('.logo-fb').style.display='flex'">

        <div class="tb-name">MWECAU ICT Club</div>
        <div class="tb-sub">Moshi · Tanzania · Est. 2023</div>

<div id="pb-wrap"><div id="pb"></div></div>
<div id="dots"></div>
<div id="ctr">01/01</div>

   icon:"🔐",tag:"Cybersecurity Awareness",

/* ── ENGINE — usibadilishe code hapa chini ── */
const stage=document.getElementById('stage');
const pb=document.getElementById('pb');
const ctr=document.getElementById('ctr');
const dotsEl=document.getElementById('dots');
let cur=0,timer=null,raf=null,ps=null,cd=8000;
let twInt=null,twMi=0,twCi=0,twEl=null,twD=null,twDel=false,twP=0;

function stopTW(){if(twInt){clearInterval(twInt);twInt=null;}}
function runTW(el,d){
  stopTW();twEl=el;twD=d;twMi=0;twCi=0;twDel=false;twP=0;
  twInt=setInterval(()=>{
    if(!twEl||!twD)return;
    const msgs=twD.messages,msg=msgs[twMi%msgs.length];
    if(twP>0){twP--;return;}
    if(!twDel){
      twCi++;
      twEl.innerHTML=msg.slice(0,twCi)+'<span class="cursor"></span>';
      if(twCi>=msg.length){twDel=true;twP=52;}
    } else {
      twCi--;
      twEl.innerHTML=msg.slice(0,twCi)+'<span class="cursor"></span>';
      if(twCi<=0){twDel=false;twP=10;twMi++;}
    }
  },52);
}

function buildSlide(d,i){
  const el=document.createElement('div');
  el.className='slide';
  if(d.type==='hero'){
    el.classList.add('s-hero');
    const tl=d.title.split('\n').join('<br>');
    el.innerHTML=`<div class="eyebrow au">${d.eyebrow}</div>
    <h1 class="au">${tl}</h1>
    <p class="tagline au">${d.tagline}</p>
    <div class="dbadge au">${d.dates.map(x=>`<div class="dpill"><span>${x.l}</span><span>${x.v}</span></div>`).join('')}</div>`;
  } else if(d.type==='activity'){
    el.classList.add('s-act');
    const tl=d.title.split('\n').map(l=>`<span>${l}</span>`).join('<br>');
    el.innerHTML=`<div class="act-c">
      <div class="act-tag al">${d.tag}</div>
      <h2 class="al">${tl}</h2>
      <p class="act-desc al">${d.desc}</p>
      <div class="act-items al">${d.items.map(x=>`<div class="ai">${x}</div>`).join('')}</div>
    </div>
    <div class="act-v ar">
      ${d.image?`<img src="${d.image}" class="act-img" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
      <div class="act-ph" style="${d.image?'display:none':''}">${d.image_emoji||'📡'}</div>
    </div>`;
  } else if(d.type==='aware'){
    el.classList.add('s-aw');
    el.innerHTML=`<div class="aw-icon au">${d.icon}</div>
    ${d.tag?`<div class="aw-tag au">${d.tag}</div>`:''}
    <h2 class="au">${d.title}</h2>
    <p class="aw-body au">${d.body}</p>
    ${d.hl?`<div class="aw-hl au">${d.hl}</div>`:''}`;
  } else if(d.type==='stat'){
    el.classList.add('s-st');
    el.innerHTML=`<div class="st-lbl au">${d.label}</div>
    <div class="st-num au"><em>${d.number}</em>${d.suffix||''}</div>
    <p class="st-sub au">${d.sub}</p>
    <div class="st-grid au">${d.stats.map(x=>`<div class="sc"><div class="n">${x.n}</div><div class="l">${x.l}</div></div>`).join('')}</div>`;
  } else if(d.type==='quote'){
    el.classList.add('s-qt');
    el.innerHTML=`<div class="qm au">"</div>
    <div class="qt au">${d.quote}</div>
    <div class="qa au">${d.author}</div>
    ${d.dept?`<div class="qd au">${d.dept}</div>`:''}`;
  } else if(d.type==='schedule'){
    el.classList.add('s-sc');
    const tl=d.title.split('\n').map(l=>`<span>${l}</span>`).join('<br>');
    el.innerHTML=`<div class="sc-h au"><div class="eyebrow">${d.eyebrow}</div><h2>${tl}</h2></div>
    <div class="sc-grid au">${d.items.map(x=>`<div class="si"><div class="dy">${x.day}</div><div class="an">${x.name}</div><div class="tb">⏰ ${x.time}</div></div>`).join('')}</div>`;
  } else if(d.type==='announce'){
    el.classList.add('s-an');
    const tl=d.title.split('\n').map(l=>`<span>${l}</span>`).join('<br>');
    el.innerHTML=`<div class="an-l">
      <div class="an-ey al">${d.eyebrow}</div>
      <h2 class="al">${tl}</h2>
      <p class="al">${d.body}</p>
      <div class="an-hi al">${d.highlights.map(x=>`<div class="an-hi-i"><div class="an-ico">${x.icon}</div><span>${x.text}</span></div>`).join('')}</div>
    </div>
    <div class="an-r ar">${d.cards.map(x=>`<div class="an-card"><div class="num">${x.num}</div><div>${x.label}</div></div>`).join('')}</div>`;
  } else if(d.type==='type'){
    el.classList.add('s-tw');
    el.innerHTML=`<div class="tw-pre au">${d.prefix}</div>
    <div class="tw-wrap au" id="tw-${i}"></div>`;
  }
  return el;
}

const sEls=SLIDES.map((d,i)=>{const e=buildSlide(d,i);stage.appendChild(e);return e;});
SLIDES.forEach((_,i)=>{const d=document.createElement('div');d.className='dot';d.onclick=()=>goTo(i);dotsEl.appendChild(d);});

function goTo(idx){
  stopTW();
  if(timer)clearTimeout(timer);
  if(raf)cancelAnimationFrame(raf);
  sEls[cur].classList.remove('active');
  cur=(idx+SLIDES.length)%SLIDES.length;
  sEls[cur].classList.add('active');
  ctr.textContent=String(cur+1).padStart(2,'0')+'/'+String(SLIDES.length).padStart(2,'0');
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
  const data=SLIDES[cur];cd=data.duration||8000;
  if(data.type==='type'){const el=document.getElementById('tw-'+cur);if(el)runTW(el,data);}
  pb.style.transition='none';pb.style.width='0%';
  ps=performance.now();
  (function tick(now){const p=Math.min(((now-ps)/cd)*100,100);pb.style.width=p+'%';if(p<100)raf=requestAnimationFrame(tick);})(performance.now());
  timer=setTimeout(()=>goTo(cur+1),cd);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);
  if(e.key==='ArrowLeft')goTo(cur-1);
});
setInterval(()=>{const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');},1000);
